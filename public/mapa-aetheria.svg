  <path d="M220 470 C 380 320, 540 300, 700 360" fill="none" stroke="#0e7490" stroke-width="8" stroke-linecap="round" />
  <path d="M680 320 L760 180 L840 320 Z" fill="#374151" stroke="#6b7280" stroke-width="2" />
  <path d="M520 340 L590 200 L660 340 Z" fill="#374151" stroke="#6b7280" stroke-width="2" />
